<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Coming Soon | Penalty Shootout Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-image: url("photo_2026-05-08_10-35-56.jpg");
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            background-color: #0f172a;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15);
            z-index: 1;
        }

        .content-container {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: calc(40px + env(safe-area-inset-bottom));
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 42px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #4ade80, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(74, 222, 128, 0.3);
        }

        p.subtitle {
            color: #cbd5e1;
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 10px;
            border-radius: 16px;
            min-width: 65px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-2px);
            border-color: rgba(74, 222, 128, 0.3);
        }

        .time-value {
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        .time-label {
            color: #94a3b8;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        @media (max-width: 380px) {
            .content-container { padding: 25px 15px; width: 90%; }
            h1 { font-size: 32px; }
            .time-box { min-width: 55px; padding: 10px 5px; }
            .time-value { font-size: 22px; }
            .countdown-wrapper { gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content-container">
        <h1>Coming Soon</h1>
        <p class="subtitle">The ultimate penalty shootout experience is almost here.</p>
        
        <div class="countdown-wrapper">
            <div class="time-box">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web App Initialization
        // if (window.Telegram && window.Telegram.WebApp) {
        //     window.Telegram.WebApp.ready();
        //     window.Telegram.WebApp.expand();
        //     if (window.Telegram.WebApp.disableVerticalSwipes) {
        //         window.Telegram.WebApp.disableVerticalSwipes();
        //     }
        //     if (window.Telegram.WebApp.requestFullscreen) {
        //         window.Telegram.WebApp.requestFullscreen();
        //     }
        // }

        // ==========================================
        // SET YOUR LAUNCH DATE HERE
        // Format: "YYYY-MM-DDTHH:MM:SS"
        // Example: "2026-06-01T12:00:00"
        // ==========================================
        const launchDate = new Date("2026-05-16T00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance <= 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Update immediately, then every second
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
